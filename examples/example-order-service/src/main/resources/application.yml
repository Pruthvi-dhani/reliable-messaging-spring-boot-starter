# Example app config. Points at the services in the repo-root docker-compose.yml.
# Run: `docker compose up -d` then `mvn -pl examples/example-order-service spring-boot:run`
spring:
  application:
    name: example-order-service
  datasource:
    url: jdbc:postgresql://localhost:5433/orders
    username: orders
    password: orders
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      # String payload + manual dedupe via @Idempotent (key = event id header)
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

server:
  port: 8080
