name: secret-scan

# Secrets can appear in any file, so this runs on every push/PR to main with no
# path filter (unlike the module build workflows).
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: read the code, write findings to the Security tab (SARIF).
permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 pulls the full history so gitleaks scans every commit,
      # not just the tip — a secret is only truly leaked once it's in history.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Runs the official gitleaks image directly (license-free — the licence
      # gate is on the gitleaks-action wrapper, not the binary). `detect` walks
      # the whole git log; --redact keeps any hit out of the CI logs. A non-zero
      # exit (leaks found) fails the job.
      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --report-format=sarif \
            --report-path=/repo/gitleaks.sarif \
            --redact \
            --exit-code=1

      # Publish results to the Security tab even when the scan fails, so a
      # finding is visible there and not just in the failed log.
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
