name: example-order-service-ci

on:
  push:
    branches: [main]
    paths:
      - "examples/example-order-service/**"
      # The example consumes the starter's SNAPSHOT from the local Maven repo,
      # so starter changes can break it — rebuild the example on those too.
      - "idempotency-outbox-spring-boot-starter/**"
      - ".github/workflows/example-order-service-ci.yml"
  pull_request:
    paths:
      - "examples/example-order-service/**"
      - "idempotency-outbox-spring-boot-starter/**"
      - ".github/workflows/example-order-service-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Until the starter is published to a registry, the example resolves it
      # from the local Maven repo — install it first (its own tests run in
      # idempotent-library-ci, so they are skipped here).
      - name: Install starter into local repo
        working-directory: idempotency-outbox-spring-boot-starter
        run: ./mvnw -B install -DskipTests

      - name: Build and verify example
        working-directory: examples/example-order-service
        run: ./mvnw -B verify
